<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bench100K">
<title>Bench 100KG Tracker</title>
<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent: #e94560;
  --accent2: #0f3460;
  --text: #f0f0f0;
  --text-dim: #8899aa;
  --input-bg: #0f3460;
  --heavy: #e74c3c;
  --volume: #27ae60;
  --paused: #f39c12;
  --accessory: #3498db;
  --success: #2ecc71;
  --border: #2a3a5e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 22px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-text-size-adjust: 100%;
}

/* ── Header ─────────────────────────── */
.header {
  background: var(--card);
  padding: 0.6rem 0.8rem;
  border-bottom: 3px solid var(--accent);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header h1 {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--accent);
  text-align: center;
  letter-spacing: 1px;
}

.header .sub {
  font-size: 0.65rem;
  color: var(--text-dim);
  text-align: center;
  margin-top: 0.15rem;
}

/* ── Selectors ──────────────────────── */
.selectors {
  display: flex;
  gap: 0.4rem;
  padding: 0.5rem 0.6rem;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}

.sel-btn {
  flex: 1;
  padding: 0.5rem 0.3rem;
  font-size: 0.8rem;
  font-weight: 700;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  text-align: center;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
}

.sel-btn.active, .sel-btn:active {
  border-color: var(--accent);
  background: var(--accent2);
}

select.sel-btn {
  font-size: 0.75rem;
}

/* ── Day Tabs ───────────────────────── */
.day-tabs {
  display: flex;
  gap: 0;
  padding: 0;
}

.day-tab {
  flex: 1;
  padding: 0.55rem 0;
  font-size: 0.8rem;
  font-weight: 800;
  text-align: center;
  border: none;
  background: var(--card);
  color: var(--text-dim);
  border-bottom: 3px solid transparent;
  cursor: pointer;
}

.day-tab.active {
  color: var(--text);
  border-bottom-color: var(--accent);
  background: var(--bg);
}

/* ── Exercise Cards ─────────────────── */
.exercises {
  padding: 0.4rem;
}

.ex-card {
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 0.5rem;
  border-left: 5px solid var(--accessory);
  overflow: hidden;
}

.ex-card.heavy { border-left-color: var(--heavy); }
.ex-card.volume { border-left-color: var(--volume); }
.ex-card.paused { border-left-color: var(--paused); }
.ex-card.warmup { border-left-color: #9b59b6; }

.ex-header {
  padding: 0.5rem 0.6rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}

.ex-name {
  font-size: 0.82rem;
  font-weight: 800;
  flex: 1;
}

.ex-prescription {
  font-size: 0.72rem;
  color: var(--text-dim);
  font-weight: 600;
  white-space: nowrap;
  margin-left: 0.4rem;
}

.ex-target {
  display: flex;
  gap: 0.5rem;
  padding: 0 0.6rem 0.3rem;
  flex-wrap: wrap;
}

.ex-target .tag {
  font-size: 0.62rem;
  padding: 0.15rem 0.4rem;
  border-radius: 6px;
  font-weight: 700;
}

.tag-pct { background: var(--accent2); color: #7eb8da; }
.tag-weight { background: #1a472a; color: #4ade80; }
.tag-rpe { background: #4a2020; color: #f87171; }

/* ── Input Area ─────────────────────── */
.ex-inputs {
  padding: 0.4rem 0.6rem 0.6rem;
  border-top: 1px solid var(--border);
  display: none;
}

.ex-card.open .ex-inputs {
  display: block;
}

.input-row {
  display: flex;
  gap: 0.35rem;
  margin-bottom: 0.35rem;
}

.input-group {
  flex: 1;
}

.input-group label {
  display: block;
  font-size: 0.52rem;
  color: var(--text-dim);
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 0.15rem;
  letter-spacing: 0.5px;
}

.input-group input, .input-group textarea {
  width: 100%;
  padding: 0.45rem 0.4rem;
  font-size: 0.85rem;
  font-weight: 700;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--input-bg);
  color: var(--text);
  text-align: center;
  -webkit-appearance: none;
}

.input-group input:focus, .input-group textarea:focus {
  outline: none;
  border-color: var(--accent);
}

.input-group textarea {
  text-align: left;
  font-size: 0.65rem;
  font-weight: 400;
  min-height: 2.2rem;
  resize: vertical;
}

.input-group input.filled {
  border-color: var(--success);
  background: #0a2a1a;
}

/* ── RPE Quick Select ───────────────── */
.rpe-buttons {
  display: flex;
  gap: 0.2rem;
  flex-wrap: wrap;
}

.rpe-btn {
  flex: 1;
  min-width: 2rem;
  padding: 0.35rem 0;
  font-size: 0.65rem;
  font-weight: 800;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  text-align: center;
  cursor: pointer;
}

.rpe-btn.selected {
  border-color: var(--accent);
  background: var(--accent);
  color: white;
}

/* ── Weight Buttons ─────────────────── */
.weight-adjust {
  display: flex;
  align-items: center;
  gap: 0.2rem;
}

.weight-adjust input {
  flex: 1;
}

.adj-btn {
  width: 2.2rem;
  height: 2.2rem;
  font-size: 1rem;
  font-weight: 900;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  text-align: center;
  cursor: pointer;
  line-height: 1;
}

.adj-btn:active {
  background: var(--accent);
  border-color: var(--accent);
}

/* ── Status Bar ─────────────────────── */
.status-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card);
  border-top: 2px solid var(--border);
  padding: 0.4rem 0.6rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
}

.status-text {
  font-size: 0.6rem;
  color: var(--text-dim);
}

.status-bar button {
  padding: 0.4rem 0.8rem;
  font-size: 0.65rem;
  font-weight: 800;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: white;
  cursor: pointer;
}

.status-bar button:active {
  opacity: 0.8;
}

.spacer { height: 3.5rem; }

/* ── Toast ──────────────────────────── */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: var(--success);
  color: white;
  padding: 0.8rem 1.5rem;
  border-radius: 12px;
  font-size: 0.8rem;
  font-weight: 800;
  opacity: 0;
  transition: all 0.3s;
  z-index: 200;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* ── Summary Modal ──────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 150;
  padding: 1rem;
  overflow-y: auto;
}

.modal-overlay.show { display: block; }

.modal {
  background: var(--card);
  border-radius: 12px;
  padding: 0.8rem;
  max-width: 500px;
  margin: 0 auto;
}

.modal h2 {
  font-size: 0.9rem;
  color: var(--accent);
  margin-bottom: 0.5rem;
}

.modal pre {
  font-size: 0.55rem;
  background: var(--bg);
  padding: 0.5rem;
  border-radius: 8px;
  overflow-x: auto;
  white-space: pre-wrap;
  color: var(--text);
  line-height: 1.5;
}

.modal button {
  margin-top: 0.5rem;
  padding: 0.4rem 0.8rem;
  font-size: 0.65rem;
  font-weight: 800;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 0.3rem;
}

.btn-copy { background: var(--accent); color: white; }
.btn-close { background: var(--border); color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <h1>BENCH 100KG</h1>
  <div class="sub" id="weekInfo">Loading program...</div>
</div>

<div class="selectors">
  <select class="sel-btn" id="weekSelect"></select>
</div>

<div class="day-tabs" id="dayTabs"></div>

<div class="exercises" id="exerciseList"></div>

<div class="spacer"></div>

<div class="status-bar">
  <span class="status-text" id="statusText">0/0 logged</span>
  <button onclick="showSummary()">EXPORT</button>
  <button onclick="syncToExcel()">SAVE</button>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">Session Summary</h2>
    <pre id="modalContent"></pre>
    <button class="btn-copy" onclick="copyExport()">COPY</button>
    <button class="btn-close" onclick="closeModal()">CLOSE</button>
  </div>
</div>

<script>
// ── Program Data (embedded) ─────────────────────
let PROGRAM = [];
let loggedData = {};
let currentWeek = '';
let currentDay = '';

// Program data embedded
function loadProgram() {
  try {
    var raw = document.getElementById("pdata").value;
    PROGRAM = JSON.parse(atob(raw));
  } catch(e) {
    // Fallback: try fetch
    try {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "program_data.json", false);
      xhr.send();
      PROGRAM = JSON.parse(xhr.responseText);
    } catch(e2) {
      document.getElementById("weekInfo").textContent = "Error loading data";
      return;
    }
  }
  
  // Load saved data from localStorage
  try {
    var saved = localStorage.getItem("bench100k_log");
    if (saved) { loggedData = JSON.parse(saved); }
  } catch(e) {}
  
  initApp();
}

function initApp() {
  // Build week selector
  const weekSelect = document.getElementById('weekSelect');
  const weeks = [...new Set(PROGRAM.map(e => e.week))];
  
  // Find current week (closest to today)
  const today = new Date();
  let bestWeek = weeks[0];
  
  weeks.forEach(w => {
    const opt = document.createElement('option');
    opt.value = w;
    opt.textContent = w;
    weekSelect.appendChild(opt);
    
    // Find exercises with dates closest to today
    const weekExercises = PROGRAM.filter(e => e.week === w && e.date);
    if (weekExercises.length > 0) {
      const parts = weekExercises[0].date.split('/');
      if (parts.length === 3) {
        const d = new Date(parts[2], parts[1]-1, parts[0]);
        const diff = Math.abs(today - d);
        if (diff < 7 * 24 * 60 * 60 * 1000) bestWeek = w;
      }
    }
  });
  
  weekSelect.value = bestWeek;
  currentWeek = bestWeek;
  
  weekSelect.addEventListener('change', () => {
    currentWeek = weekSelect.value;
    renderDays();
  });
  
  renderDays();
}

function renderDays() {
  const exercises = PROGRAM.filter(e => e.week === currentWeek);
  const days = [...new Set(exercises.map(e => e.day))];
  
  // Update week info
  const firstEx = exercises[0];
  document.getElementById('weekInfo').textContent = 
    firstEx ? `${firstEx.weekType} • ${firstEx.date || ''}` : '';
  
  // Render day tabs
  const tabsDiv = document.getElementById('dayTabs');
  tabsDiv.innerHTML = '';
  
  if (!currentDay || !days.includes(currentDay)) {
    currentDay = days[0] || '';
  }
  
  days.forEach(d => {
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (d === currentDay ? ' active' : '');
    tab.textContent = d.toUpperCase();
    tab.onclick = () => {
      currentDay = d;
      renderDays();
    };
    tabsDiv.appendChild(tab);
  });
  
  renderExercises();
}

function renderExercises() {
  const exercises = PROGRAM.filter(e => e.week === currentWeek && e.day === currentDay);
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';
  
  exercises.forEach((ex, idx) => {
    const key = `${ex.row}`;
    const saved = loggedData[key] || {};
    const card = document.createElement('div');
    
    // Determine card type
    let cardClass = '';
    const name = ex.exercise.toLowerCase();
    if (name.includes('heavy') || name.includes('light')) cardClass = 'heavy';
    else if (name.includes('volume') || name.includes('speed')) cardClass = 'volume';
    else if (name.includes('paused')) cardClass = 'paused';
    else if (name.includes('band pull')) cardClass = 'warmup';
    
    const hasData = saved.weight || saved.rpe || saved.reps;
    
    card.className = `ex-card ${cardClass}${hasData ? ' open' : ''}`;
    card.innerHTML = buildExerciseHTML(ex, saved, key);
    list.appendChild(card);
  });
  
  updateStatus();
}

function buildExerciseHTML(ex, saved, key) {
  const targetInfo = [];
  if (ex.targetPct) targetInfo.push(`<span class="tag tag-pct">${ex.targetPct}</span>`);
  if (ex.targetWeight) targetInfo.push(`<span class="tag tag-weight">${ex.targetWeight}kg</span>`);
  if (ex.targetPct && ex.targetPct.includes('RPE')) {
    // skip
  }
  
  const prescription = ex.sets ? `${ex.sets}×${ex.reps}` : ex.reps;
  
  // Pre-fill with existing actual data from spreadsheet or saved data
  const weight = saved.weight || ex.actualWeight || '';
  const rpe = saved.rpe || ex.actualRPE || '';
  const reps = saved.reps || ex.repsCompleted || '';
  const notes = saved.notes || ex.notes || '';
  
  const filledW = weight ? 'filled' : '';
  const filledR = reps ? 'filled' : '';
  
  // RPE buttons
  const rpeValues = ['5', '6', '7', '7.5', '8', '8.5', '9', '9.5', '10'];
  const rpeBtns = rpeValues.map(v => 
    `<button class="rpe-btn${rpe == v ? ' selected' : ''}" onclick="setRPE('${key}', '${v}', this)">${v}</button>`
  ).join('');
  
  return `
    <div class="ex-header" onclick="toggleCard(this)">
      <span class="ex-name">${ex.exercise}</span>
      <span class="ex-prescription">${prescription}</span>
    </div>
    ${targetInfo.length ? `<div class="ex-target">${targetInfo.join('')}</div>` : ''}
    <div class="ex-inputs">
      <div class="input-row">
        <div class="input-group" style="flex:1.5">
          <label>WEIGHT (kg)</label>
          <div class="weight-adjust">
            <button class="adj-btn" onclick="adjustWeight('${key}', -2.5, this)">−</button>
            <input type="number" inputmode="decimal" step="0.5" class="${filledW}" 
                   value="${weight}" placeholder="${ex.targetWeight || '—'}"
                   onchange="saveField('${key}', 'weight', this.value)"
                   id="w_${key}">
            <button class="adj-btn" onclick="adjustWeight('${key}', 2.5, this)">+</button>
          </div>
        </div>
        <div class="input-group">
          <label>REPS</label>
          <input type="text" inputmode="text" class="${filledR}" 
                 value="${reps}" placeholder="${ex.reps || '—'}"
                 onchange="saveField('${key}', 'reps', this.value)"
                 id="r_${key}">
        </div>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label>RPE</label>
          <div class="rpe-buttons">${rpeBtns}</div>
        </div>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label>NOTES</label>
          <textarea placeholder="Set breakdown, form notes..."
                    onchange="saveField('${key}', 'notes', this.value)"
                    id="n_${key}">${notes}</textarea>
        </div>
      </div>
    </div>
  `;
}

function toggleCard(header) {
  const card = header.closest('.ex-card');
  card.classList.toggle('open');
}

function saveField(key, field, value) {
  if (!loggedData[key]) loggedData[key] = {};
  loggedData[key][field] = value;
  
  // Update filled class
  const input = document.getElementById((field === 'weight' ? 'w_' : field === 'reps' ? 'r_' : 'n_') + key);
  if (input && value) input.classList.add('filled');
  else if (input) input.classList.remove('filled');
  
  saveToStorage();
  updateStatus();
}

function setRPE(key, value, btn) {
  if (!loggedData[key]) loggedData[key] = {};
  
  // Toggle off if already selected
  if (loggedData[key].rpe === value) {
    loggedData[key].rpe = '';
    btn.classList.remove('selected');
  } else {
    loggedData[key].rpe = value;
    // Update UI
    const parent = btn.parentElement;
    parent.querySelectorAll('.rpe-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }
  
  saveToStorage();
  updateStatus();
}

function adjustWeight(key, delta, btn) {
  const input = document.getElementById('w_' + key);
  let val = parseFloat(input.value) || 0;
  
  // If empty, start from target weight
  if (!input.value) {
    const ex = PROGRAM.find(e => String(e.row) === key);
    val = ex && ex.targetWeight ? ex.targetWeight : 0;
  }
  
  val = Math.max(0, val + delta);
  val = Math.round(val * 2) / 2; // Round to 0.5
  input.value = val;
  input.classList.add('filled');
  saveField(key, 'weight', val);
}

function saveToStorage() {
  localStorage.setItem('bench100k_log', JSON.stringify(loggedData));
}

function updateStatus() {
  const exercises = PROGRAM.filter(e => e.week === currentWeek && e.day === currentDay);
  let logged = 0;
  exercises.forEach(ex => {
    const key = String(ex.row);
    const s = loggedData[key];
    if (s && (s.weight || s.reps)) logged++;
  });
  document.getElementById('statusText').textContent = `${logged}/${exercises.length} logged`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function showSummary() {
  const exercises = PROGRAM.filter(e => e.week === currentWeek && e.day === currentDay);
  let text = `${currentWeek} - ${currentDay}\n`;
  text += '═'.repeat(35) + '\n\n';
  
  exercises.forEach(ex => {
    const key = String(ex.row);
    const s = loggedData[key] || {};
    const weight = s.weight || ex.actualWeight || '';
    const rpe = s.rpe || ex.actualRPE || '';
    const reps = s.reps || ex.repsCompleted || '';
    const notes = s.notes || ex.notes || '';
    
    text += `${ex.exercise}\n`;
    text += `  Rx: ${ex.sets || ''}×${ex.reps || ''} @ ${ex.targetWeight ? ex.targetWeight + 'kg' : 'BW'}\n`;
    if (weight || reps || rpe) {
      text += `  Actual: ${weight ? weight + 'kg' : '—'} × ${reps || '—'} RPE ${rpe || '—'}\n`;
    }
    if (notes) text += `  Notes: ${notes}\n`;
    text += '\n';
  });
  
  document.getElementById('modalTitle').textContent = `${currentWeek} - ${currentDay}`;
  document.getElementById('modalContent').textContent = text;
  document.getElementById('modal').classList.add('show');
}

function copyExport() {
  const text = document.getElementById('modalContent').textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('COPIED!');
  }).catch(() => {
    // Fallback for iOS
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('COPIED!');
  });
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

// Generate CSV for syncing back to Excel
function syncToExcel() {
  let csv = 'Row,Exercise,Actual Weight (kg),Actual RPE,Reps Completed,Notes\n';
  let count = 0;
  
  for (const [key, data] of Object.entries(loggedData)) {
    if (data.weight || data.reps || data.rpe || data.notes) {
      const ex = PROGRAM.find(e => String(e.row) === key);
      const name = ex ? ex.exercise : key;
      const w = data.weight || '';
      const r = data.rpe || '';
      const reps = data.reps || '';
      const notes = (data.notes || '').replace(/"/g, '""');
      csv += `${key},"${name}",${w},${r},"${reps}","${notes}"\n`;
      count++;
    }
  }
  
  if (count === 0) {
    showToast('Nothing to save');
    return;
  }
  
  // Download CSV
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bench100k_log_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`${count} entries saved`);
}

// Start — wait for full DOM (textarea with data is after this script)
